# ============================================================
# 中医问诊与养生平台 - 应用配置文件
# 任务：根据注释提示，补充完整的配置信息
# ============================================================

server:
  port: ${SERVER_PORT:8080}

http:
  client:
    connect-timeout: 5s
    read-timeout: 60s

spring:
  application:
    name: tcm-platform
  
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tcm_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# ============================================================
# MyBatis-Plus 配置
# ============================================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============================================================
# JWT 配置
# ============================================================
jwt:
  secret: ${JWT_SECRET:tcm-platform-development-secret-key-change-me}
  expiration: 86400000

# ============================================================
# AI 配置（阿里云 DashScope）
# ============================================================
ai:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    model: ${DASHSCOPE_MODEL:qwen-plus}

# ============================================================
# 文件上传配置
# ============================================================
tcm:
  upload:
    path: ${UPLOAD_PATH:./uploads}
