name: tcm-platform-deploy
services:
  mysql:
    image: mysql:8.4
    container_name: tcm-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tcm_platform
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-tcm_dev_root_password}
      MYSQL_USER: ${MYSQL_USER:-tcm_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tcm_dev_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/main/resources/migration/knowledge_content_seed.sql:/docker-entrypoint-initdb.d/02-knowledge-content-seed.sql:ro
      - ./backend/src/main/resources/demo-data.sql:/docker-entrypoint-initdb.d/03-demo-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: tcm-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/tcm_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-tcm_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-tcm_dev_password}
      JWT_SECRET: ${JWT_SECRET:-tcm-platform-local-docker-secret-change-me}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      UPLOAD_PATH: /app/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: tcm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"

volumes:
  mysql_data:
  uploads_data:

